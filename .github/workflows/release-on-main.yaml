name: Release on main

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    # Release only when a main-branch commit message explicitly includes "release".
    if: >
      ${{ contains(github.event.head_commit.message, 'release') &&
          !contains(github.event.head_commit.message, '[skip ci]') &&
          !contains(github.event.head_commit.message, '[no release]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        env:
          GIT_CLIFF_VERSION: "2.7.0"
        run: |
          set -euo pipefail
          curl -sL "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo install -m755 "git-cliff-${GIT_CLIFF_VERSION}/git-cliff" /usr/local/bin/git-cliff
          git-cliff --version

      - name: Mountain release title & semver tag
        id: meta
        run: |
          set -euo pipefail
          NEXT="$(git-cliff --bumped-version --config cliff.toml)"
          TAG="${NEXT#v}"
          TAG="v${TAG}"

          PEAKS=(
            "Everest" "K2" "Kangchenjunga" "Lhotse" "Makalu" "Cho Oyu"
            "Dhaulagiri" "Manaslu" "Nanga Parbat" "Annapurna" "Denali"
            "Aconcagua" "Kilimanjaro" "Elbrus" "Vinson" "Puncak Jaya"
            "Mont Blanc" "Matterhorn" "Olympus" "Triglav"
          )
          HASH="$(printf '%s' "${GITHUB_SHA}${TAG}" | cksum | cut -d' ' -f1)"
          IDX=$((HASH % ${#PEAKS[@]}))
          NAME="${PEAKS[$IDX]} Peak"

          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        run: |
          set -euo pipefail
          PREV="$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || true)"
          TAG="${{ steps.meta.outputs.tag }}"

          if [ -n "${PREV}" ]; then
            git-cliff "${PREV}..HEAD" --tag "${TAG}" --config cliff.toml > release_notes.md || true
          else
            git-cliff --tag "${TAG}" --config cliff.toml > release_notes.md || true
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.name }} ${{ steps.meta.outputs.tag }}" \
            --notes-file release_notes.md
