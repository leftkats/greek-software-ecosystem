# Regenerates readme / engineering-hubs on `main`, builds `index.html` with Python,
# runs **Jekyll** (`jekyll-pages/`: `jekyll-sitemap` + Liquid `robots.txt`), then
# force-pushes `_site/` (+ `.nojekyll`) to branch `live` for GitHub Pages.
#
# Skips when the triggering push was the bot follow-up (`[skip ci]` in the message).
# **Settings → Pages → Branch `live`, folder `/`.**

name: Update Docs and README on Merge

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-main-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    # workflow_dispatch / schedule: do not use head_commit (often unset → job was skipped).
    # push: skip bot follow-up commits with [skip ci].
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'push' &&
       !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up just
        uses: extractions/setup-just@v3
        with:
          just-version: "1.40.0"

      - name: Install Python and dependencies
        run: just sync --frozen

      - name: Set up Ruby (Jekyll for sitemap.xml and robots.txt)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: "2.5.23"
          bundler-cache: true
          working-directory: jekyll-pages

      - name: Sync content and deploy site to live
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          run_gen_index() {
            just index
          }

          # Jekyll build → _site/ (sitemap.xml, robots.txt, index.html, assets).
          # .nojekyll: GitHub Pages serves files as-is (no second Jekyll pass on `live`).
          deploy_live() {
            LIVE_MSG="$1"
            WORK="$(mktemp -d)"
            cp -a "${GITHUB_WORKSPACE}/jekyll-pages/." "${WORK}/"
            uv run python "${GITHUB_WORKSPACE}/scripts/jekyll_url_config.py" > "${WORK}/_url.yml"
            cp "${GITHUB_WORKSPACE}/index.html" "${WORK}/"
            mkdir -p "${WORK}/assets/css" "${WORK}/assets/js"
            cp "${GITHUB_WORKSPACE}/assets/css/index.css" "${WORK}/assets/css/"
            cp "${GITHUB_WORKSPACE}/assets/js/analytics-consent.js" "${GITHUB_WORKSPACE}/assets/js/index.js" "${GITHUB_WORKSPACE}/assets/js/tailwind-config.js" "${WORK}/assets/js/"
            cp "${GITHUB_WORKSPACE}/assets/og-image.png" "${GITHUB_WORKSPACE}/assets/vectorized.svg" "${WORK}/assets/"
            (
              cd "${WORK}"
              bundle install
              bundle exec jekyll build --config _config.yml,_url.yml
            )
            SITE="${WORK}/_site"
            touch "${SITE}/.nojekyll"
            (
              cd "${SITE}"
              git init -b live
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git config user.name "github-actions[bot]"
              git add -A
              git commit -m "${LIVE_MSG}"
              git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
              git push --force origin live
            )
            rm -rf "${WORK}"
          }

          if [ "$EVENT_NAME" = "push" ]; then
            just readme
            run_gen_index

            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"

            git add readme.md engineering-hubs.md
            MAIN_CHANGED=0
            if git diff --staged --quiet; then
              echo "No main-branch doc changes to commit."
            else
              git commit -m "chore(📚): auto-update docs with fresh content [skip ci]"
              MAIN_CHANGED=1
            fi

            deploy_live "chore: deploy static site from main [skip ci]"

            if [ "$MAIN_CHANGED" -eq 1 ]; then
              git push origin main
            fi
          fi

          if [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            just fetch
            just readme
            run_gen_index

            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add readme.md engineering-hubs.md _data/workable_counts.yaml
            MAIN_CHANGED=0
            if git diff --staged --quiet; then
              echo "No main-branch changes to commit."
            else
              if [ "$EVENT_NAME" = "schedule" ]; then
                git commit -m "chore: refresh Workable job counts (weekly schedule) [skip ci]"
              else
                git commit -m "chore: refresh Workable job counts (manual) [skip ci]"
              fi
              MAIN_CHANGED=1
            fi

            deploy_live "chore: deploy static site after Workable refresh [skip ci]"

            if [ "$MAIN_CHANGED" -eq 1 ]; then
              git push origin main
            fi
          fi
