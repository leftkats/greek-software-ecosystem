name: Update Docs and README on Merge

on:
  push:
    branches:
      - main
  schedule:
    # Weekly Monday 05:00 UTC — refresh Workable Greece counts + regenerate index.html
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-main-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'leftkats/awesome-greek-tech-jobs'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python and dependencies
        run: uv sync --frozen

      - name: Sync Content
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "push" ]; then
            uv run python -m scripts.generate_readme
            uv run python -m scripts.generate_index

            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add readme.md engineering-hubs.md index.html

            if git diff --staged --quiet; then
              echo "No changes to commit."
            else
              git commit -m "chore(📚): auto-update docs with fresh content [skip ci]"
              git push origin main
            fi
          fi

          if [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            uv run python -m scripts.fetch_workable_counts
            uv run python -m scripts.generate_index

            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add index.html data/workable_counts.yaml

            if git diff --staged --quiet; then
              echo "No changes to commit."
            else
              git commit -m "chore: refresh Workable job counts (weekly schedule) [skip ci]"
              git push origin main
            fi
          fi
