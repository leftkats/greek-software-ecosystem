# Regenerates `docs/*.md` + root `README.md` on `main`, builds static HTML with Python,
# runs **Jekyll** (`jekyll-pages/`), copies **Python-generated** `sitemap.xml` / `robots.txt`, then
# force-pushes `_site/` (+ `.nojekyll`) to branch `live` for GitHub Pages.
#
# **Currently disabled** — the `deploy` job uses `if: false`. Remove that guard to re-enable.
# Skips when the triggering push was the bot follow-up (`[skip ci]` in the message).
# **Settings → Pages → Branch `live`, folder `/`.**

name: Update Docs and README on Merge

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sync-main-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    # Disabled — delete the next line and uncomment the block below to re-enable.
    if: false
    # if: >-
    #   github.event_name == 'workflow_dispatch' ||
    #   (github.event_name == 'push' &&
    #    !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up just
        uses: extractions/setup-just@v3
        with:
          just-version: "1.40.0"

      - name: Install Python and dependencies
        run: just sync --frozen

      - name: Set up Ruby (Jekyll site build)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: "2.5.23"
          bundler-cache: true
          working-directory: jekyll-pages

      - name: Sync content and deploy site to live
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          run_gen_index() {
            just index-all
          }

          # Jekyll build → _site/ (HTML + assets). sitemap.xml / robots.txt from Python (just index-all).
          # .nojekyll: GitHub Pages serves files as-is (no second Jekyll pass on `live`).
          deploy_live() {
            LIVE_MSG="$1"
            WORK="$(mktemp -d)"
            cp -a "${GITHUB_WORKSPACE}/jekyll-pages/." "${WORK}/"
            uv run python -m greek_software_ecosystem.jekyll_url_config > "${WORK}/_url.yml"
            for f in index.html employers.html job-search.html resources.html podcasts.html workspaces.html open-source.html; do
              cp "${GITHUB_WORKSPACE}/${f}" "${WORK}/"
            done
            mkdir -p "${WORK}/assets/css" "${WORK}/assets/js"
            cp "${GITHUB_WORKSPACE}/assets/css/index.css" "${WORK}/assets/css/"
            cp "${GITHUB_WORKSPACE}/assets/js/analytics-consent.js" "${GITHUB_WORKSPACE}/assets/js/index.js" "${GITHUB_WORKSPACE}/assets/js/open-source-search.js" "${GITHUB_WORKSPACE}/assets/js/site-chrome.js" "${GITHUB_WORKSPACE}/assets/js/tailwind-config.js" "${WORK}/assets/js/"
            cp "${GITHUB_WORKSPACE}/assets/og-image.png" "${GITHUB_WORKSPACE}/assets/hub-icon.svg" "${GITHUB_WORKSPACE}/assets/vectorized.svg" "${WORK}/assets/"
            (
              cd "${WORK}"
              bundle install
              bundle exec jekyll build --config _config.yml,_url.yml
            )
            SITE="${WORK}/_site"
            cp "${GITHUB_WORKSPACE}/sitemap.xml" "${GITHUB_WORKSPACE}/robots.txt" "${SITE}/"
            touch "${SITE}/.nojekyll"
            (
              cd "${SITE}"
              git init -b live
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git config user.name "github-actions[bot]"
              git add -A
              git commit -m "${LIVE_MSG}"
              git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
              git push --force origin live
            )
            rm -rf "${WORK}"
          }

          if [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            just readme
            run_gen_index

            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"

            git add README.md docs/*.md _data/readme.yaml _data/open_source_projects.yaml
            MAIN_CHANGED=0
            if git diff --staged --quiet; then
              echo "No main-branch doc changes to commit."
            else
              if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                git commit -m "chore: regenerate docs and site (manual) [skip ci]"
              else
                git commit -m "chore(📚): auto-update docs with fresh content [skip ci]"
              fi
              MAIN_CHANGED=1
            fi

            deploy_live "chore: deploy static site from main [skip ci]"

            if [ "$MAIN_CHANGED" -eq 1 ]; then
              git push origin main
            fi
          fi
