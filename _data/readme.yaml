title: "Greek Software Ecosystem"
tagline: "The open-source pulse on remote-first IT and software jobs in Greece"
description: >
  **Greek Software Ecosystem** is a community-maintained collection for people exploring
  software and technology careers in Greece. This repository contains a list of
  **remote-first companies** — a **sortable employer directory** (with weekly **Workable**
  open-role snapshots where applicable), **curated job-search links** and tips, pointers to
  **Greek tech podcasts**, and a short list of **remote café / laptop-friendly workspace**
  resources—linked from the overview below.

# Shown on the README overview, the site home hero, and the job-search page (Markdown; ``generate_index`` renders HTML).
work_policy_notice: >
  **Note:** Work policy labels are community-maintained and may be incorrect or outdated.
  Always verify roles, locations, and policies on each employer's official website using the
  company and careers URLs in the directory.

live_url: "https://leftkats.github.io/greek-software-ecosystem/"
# Shown as the centered link under the badges (readme header).
live_directory_cta: "Open the interactive directory"
repo: "leftkats/greek-software-ecosystem"

# Prose for Markdown files produced by greek_software_ecosystem.generate_readme
# (outputs under docs/). Do not edit those generated *.md files by hand.
# Use {issue_chooser_url} in engineering_hubs.disclaimer — replaced when generating engineering-hubs.md.
# Omit disclaimer or leave it empty to use the built-in default (disclaimer is always emitted).
generated_markdown:
  search_queries:
    intro: >
      Hand-picked links for Greek (and broader remote) job hunting.
      Each entry includes a short note on what you'll find there.
      For **laptop-friendly cafés and remote workspaces**, see **[remote-cafe-resources.md](remote-cafe-resources.md)**.
  engineering_hubs:
    title: "Remote-first Employers & Career Portals"
    intro: >
      Curated remote-first organizations, focus sectors, and talent links.
    disclaimer: >
      **Disclaimer:** This list is community-maintained and includes **remote-first companies only**.
      Information may be incomplete, outdated, or incorrect—including **work policy** tags,
      which are not verified with employers. Always confirm policies and openings on each
      company's official site. If you notice an error or want an update, please
      [open a GitHub issue]({issue_chooser_url}) (pick the template that fits).
  readme:
    overview_links_paragraph: |
      **What's in this repository**

      - **[engineering-hubs.md](engineering-hubs.md)** — the sortable remote-first employer table: sectors, work policy, and talent portals.
      - **[search-queries-and-resources.md](search-queries-and-resources.md)** — job search links, curated lists, and tips & notes.
      - **[greek-tech-podcasts.md](greek-tech-podcasts.md)** — Greek tech & startup podcasts (video and audio).
      - **[open-source-projects.md](open-source-projects.md)** — open source Greek tech projects on GitHub you can contribute to.
      - **[remote-cafe-resources.md](remote-cafe-resources.md)** — remote café & laptop-friendly workspace guides (e.g. [Remote Work Café](https://remotework.cafe/)).
    development_section_blurb: >
      Setup, regeneration commands, and CI checks are documented in **[development.md](development.md)** (copy-paste shell blocks).

branding:
  # Second line under the tagline; set to null to hide.
  intro_line_2: null

# Site and README: Workable open-role counts (badge, per-company counts, sort/filter).
features:
  workable_job_counts:
    enabled: false

badges:
  stats:
    style: "for-the-badge"
    companies_color: "2563eb"
    open_roles_color: "f59e0b"
    remote_color: "16a34a"
    hybrid_color: "ca8a04"
    # Curated entries in _data/podcasts.yaml (shown on badge; regenerated with `just readme`).
    podcasts_color: "9333ea"
  meta:
    show_ci: false
    ci_workflow: "pr-validation.yaml"
    show_license: true
    show_last_commit: true

# Discord badge and "Community" section in the generated README.
# `invite` is the code only (after https://discord.gg/ ). Set to null to hide both.
community:
  discord:
    invite: "TywcYPMs"
    badge_label: "Community"
    color: "5865F2"
    # Optional. Use {url} for the invite link, or omit for the default sentence.
    # description: |
    #   **[Our Discord]({url})** — your text here.

disclaimer: >
  This project is for **community and educational purposes only**.
  All data is aggregated from publicly available sources (company
  websites, LinkedIn, Workable's public API).  Job counts shown are
  **cached snapshots** generated weekly and **do not represent
  a real-time official database**.


  **Please note:**

  * **Non-Affiliation:** This project is independent and is not affiliated
    with, sponsored by, or endorsed by any of the companies listed.
    All company names and links are the property of their respective owners.

  * **Public Data Only:** Job counts are retrieved from Workable's
    unauthenticated, publicly accessible API endpoints.  No private
    data, scraping behind login walls, or terms-of-service circumvention
    is involved.

  * **Accuracy:** Information is gathered from public sources.  Company
    policies and openings change frequently — always verify on the
    official company website. **Work policy** labels may be wrong;
    rely on each employer's own careers pages and URLs.

  * **Contributions:** Spotted an error?  PRs and issues are welcome.

  * **Liability:** As per the [MIT License](LICENSE), this information
    is provided "as is" without warranty of any kind.

# Drives docs [development.md](development.md) (copy-paste command blocks).
development:
  intro: >
    Use [uv](https://github.com/astral-sh/uv) for Python and
    [just](https://github.com/casey/just) for short commands. Each block below is a
    fenced shell snippet you can copy into your terminal.
    `just index` writes `index.html`, `job-search.html` (employer directory + job-board links), `employers.html`
    (redirect to `job-search.html#employers`), `resources.html`, `podcasts.html`, `sitemap.xml`, and `robots.txt`
    (plus shared `assets/`) for the static site. Those files are gitignored on **`main`** (do not commit them);
    **`sitemap.xml`** / **`robots.txt`** are included only in the CI deploy to branch **`live`**. Branch **`live`**
    (GitHub Pages) holds the built site after CI.
  blocks:
    - title: "Install or refresh dependencies"
      commands:
        - just setup
        - just sync
      note: "In CI, use `just sync --frozen`."
    - title: "Regenerate readme, hubs, search-queries, and index (no Workable fetch)"
      commands:
        - just generate
    - title: "Fetch Workable counts, then regenerate everything"
      commands:
        - just all
    - title: "Same checks as pull request validation"
      commands:
        - just check
    - title: "Jekyll (optional): build the live site bundle like CI"
      note_before: >
        Requires Ruby/Bundler. Run `just index` first, then copy `index.html`, `employers.html`, `job-search.html`,
        `resources.html`, `podcasts.html`, `sitemap.xml`, `robots.txt`, and `assets/` into `jekyll-pages/` as in CI, then run:
      commands:
        - uv run python -m greek_software_ecosystem.jekyll_url_config > jekyll-pages/_url.yml
        - cd jekyll-pages && bundle install && bundle exec jekyll build --config _config.yml,_url.yml
    - title: "Run script modules directly (equivalent to just recipes)"
      commands:
        - uv run python -m greek_software_ecosystem.generate_readme
        - uv run python -m greek_software_ecosystem.generate_index
        - uv run python -m greek_software_ecosystem.fetch_workable_counts
  footer: >
    See [contributing.md](../contributing.md) for the full workflow and repository
    conventions.

footer:
  description: "Built with ❤️ by the community. PRs welcome!"
  # Tips & Notes appear in search-queries-and-resources.md only (not the main readme).
  notes:
    - title: "Remote-first employers"
      content: "This list includes companies tagged as remote-first. Some may still list Greek office locations for legal or tax purposes."
    - title: "Salary Insight"
      content: >
        Remote roles for international companies (via B2B) usually pay
        higher than local Greek contracts.  Weigh the trade-offs when
        the latter includes private health coverage.
    - title: "Interview Prep"
      content: "Focus on System Design for Senior roles and LeetCode (Medium) for mid-level."
    - title: "Job Counts"
      content: >
        Workable counts are fetched weekly via CI from the public API and
        may be inaccurate due to timing, geography filters, or API behavior.
