intro: |
  Hand-picked **video and audio shows** from Greece that often cover **technology, startups, product, and engineering**—useful listening next to the employer directory and job-search links in **[Job search & resources](search-queries-and-resources.md)**.

disclaimer: |
  **Disclaimer:** This list is community-maintained. Shows and links may change; verify on the official channels above.

podcasts:
  - title: Θέματα περί ανάλυσης
    website_url: https://www.alexandra-athanasakou.gr/greek-data-analytics-podcast/
    spotify_url: https://open.spotify.com/show/3hBzOM5XNy3UdHuJkTwiaM
    apple_podcasts_url: https://podcasts.apple.com/us/podcast/%CE%B8%CE%AD%CE%BC%CE%B1%CF%84%CE%B1-%CF%80%CE%B5%CF%81%CE%AF-%CE%B1%CE%BD%CE%AC%CE%BB%CF%85%CF%83%CE%B7%CF%82/id1759045921
    youtube_url: https://www.youtube.com/playlist?list=PLXabVLMBjSRSo1GYG2dbuykBZAeBLve8B
    podlist_url: https://podlist.gr/p/themata-peri-analysis-850
    description: |
      Κάθε μήνα και ημέρα Τρίτη υπάρχουν θέματα προς ανάλυση... Με καλεσμένους ή και μεταξύ μας.
      Ο κλάδος των δεδομένων είναι πολύ μεγάλος και αυτό το podcast κάνει τα σύνθετα απλά μέσα
      από επαγγελματίες του χώρου οι οποίοι μοιράζονται την πορεία τους, αλλά και την πραγματικότητα
      που ζουν μέσα από τον ρόλο τους. Μαζί, συζητάμε πράγματα που μας απασχολούν επαγγελματικά
      για τον κλάδο της δεδομένων... και άλλα πολλά! Για εσένα που ενδιαφέρεσαι για την
      τεχνολογία και ιδιαίτερα για την αξιοποίηση των δεδομένων, αυτό το podcast είναι για εσένα!

  - title: 42 Minutes of SaaS
    website_url: https://42minutesofsaas.com/
    spotify_url: https://open.spotify.com/show/03VRVmquUJsznQgfT5kzmf
    apple_podcasts_url: https://podcasts.apple.com/gr/podcast/42-minutes-of-saas/id1777907426?l=el
    youtube_url: https://www.youtube.com/@42MinutesOfSaaS
    podlist_url: https://podlist.gr/p/42-minutes-of-saas-805
    description: |
      Listen to 42 minutes of SaaS on Spotify. Two engineers exploring the world of building a bootstrapped SaaS business.

  - title: "Μικρή Κουβέντα (Mikri Kouventa)"
    website_url: https://mikrikouventa.fm/
    spotify_url: https://open.spotify.com/show/2jYxcClL09OtszEqIYyjPD
    youtube_url: https://www.youtube.com/@mikrikouventa
    apple_podcasts_url: https://podcasts.apple.com/gr/podcast/%CE%BC%CE%B9%CE%BA%CF%81%CE%AE-%CE%BA%CE%BF%CF%85%CE%B2%CE%AD%CE%BD%CF%84%CE%B1/id1490436652
    description: |
      [**Μικρή Κουβέντα**](https://mikrikouventa.fm/) (*Mikri Kouventa*) is a **video podcast** in Greek about technology, entrepreneurship, and current affairs. The project also publishes **Small Talk**, an English-language series with similar themes.

  - title: Hustle Hours
    website_url: https://www.hustlehours.com/
    spotify_url: https://open.spotify.com/show/05k6BivafotwATAW0Icggc
    youtube_url: https://www.youtube.com/@HustleHoursPodcast
    description: |
      [**Hustle Hours**](https://www.hustlehours.com/) started as a podcast on youth entrepreneurship and grew into a **community for founders**: interviews, Startup School-style videos, and **events** connecting builders in Greece (and further afield).

  - title: Outliers
    website_url: https://outliers.gr/el/
    spotify_url: https://open.spotify.com/show/6B0xjt9pzbLwhmuELdImah
    youtube_url: https://www.youtube.com/playlist?list=PLQS4HLiwaedjymCMGokmBzQYk9bA_NOtt
    apple_podcasts_url: https://podcasts.apple.com/gr/podcast/outliers/id1540997257
    description: |
      [**Outliers**](https://outliers.gr/el/) by **Endeavor Greece** spotlights standout founders: weekly conversations with people behind successful startups in Greece and abroad—journeys, lessons, and sector outlooks—with host **Panagiotis Karabinis** (CEO, Endeavor Greece). Episodes and notes also live on [outliers.gr](https://outliers.gr/el/).

  - title: SmartTalks
    website_url: https://www.smarttalks.gr
    apple_podcasts_url: https://podcasts.apple.com/gr/podcast/smarttalks/id1694363227
    description: |
      [**SmartTalks**](https://www.smarttalks.gr) from **[Infocom.gr](https://www.infocom.gr/)** and **Smartpress**—interviews on **technology, telecoms, and business**, hosted by journalist **Christos Kotsakas** (*Χρήστος Κοτσακάς*). Episodes are listed on [smarttalks.gr](https://www.smarttalks.gr).

  - title: "Hack U, με τον Μίλτο Μακρίδη"
    website_url: https://pod.gr/hack-u/
    spotify_url: https://open.spotify.com/show/38vxk54B0cVcKelSV1ayDh
    apple_podcasts_url: https://podcasts.apple.com/gr/podcast/hack-u/id1686388624
    podlist_url: https://podlist.gr/p/hack-u-me-ton-milto-makridi-671
    description: |
      [**Hack U, με τον Μίλτο Μακρίδη**](https://pod.gr/hack-u/) (*Hack U*) from **[pod.gr](https://pod.gr/)** explores how **digital culture and innovation** shape everyday life—AI, blockchain, and more—with host **Μίλτος Μακρίδης** (*Miltos Makridis*) and Greek researchers, founders, and makers.

